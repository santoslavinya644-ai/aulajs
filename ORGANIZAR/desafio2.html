<head>
    <meta charset="UTF-8">

</head>

<body>
    <h1>DESAFIO 02 - SOMA OU SUBTRAÇÃO (DIRETAMENTE) </h1>
    <hr>
    <h2 id="resp"></h2>

    <script>
        window.alert("Seja bem-vindo ao site");
        let num1 = window.prompt("Me informe um número: ");
        num1 = parseFloat(num1)
        console.log(num1);
        let num2 = window.prompt("Me informe outro número: ")
        console.log(num2);
        num2 = parseFloat(num2)
        let resp = window.prompt("Você deseja somar (+) ou subtrair (-)?");
        let resultado = 0;
        console.log(resp);
        if (resp == "+") {
            resultado = num1 + num2
            window.alert("A soma é: " + resultado);
        } else {
            resultado = num1 - num2
            window.alert("A subtração é:" + resultado);
        }
        document.getElementById("resp").innerHTML=resultado
        
    </script>

</body>

</html>
